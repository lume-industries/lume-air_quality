topic: programming
display_name: "Programming & Computing"
facts:
  - fact: "'Programs must be written for people to read, and only incidentally for machines to execute'  -  Abelson, SICP"
  - fact: "The null pointer was called a 'billion-dollar mistake' by its inventor Tony Hoare in 2009"
  - fact: "Git was created by Linus Torvalds in 2005 in about 10 days  -  originally to manage the Linux kernel"
  - fact: "The most important programming skill is reading other people's code  -  not writing your own"
  - fact: "Rubber duck debugging  -  explaining your code to an inanimate object  -  is a legitimate and effective technique"
  - fact: "SQL was designed in the 1970s and is still the most widely used data query language in the world"
  - fact: "The CAP theorem: a distributed system can only guarantee two of: Consistency, Availability, Partition tolerance"
  - fact: "'Premature optimization is the root of all evil'  -  Knuth (often misquoted  -  he was talking about 97% of code)"
  - fact: "Binary search is O(log n)  -  to find an item in 4 billion sorted records requires at most 32 comparisons"
  - fact: "The halting problem (Turing, 1936): no program can determine whether an arbitrary program will halt or run forever"
  - fact: "Version control is not a backup  -  it tracks intent and change history. But it's non-negotiable for professional code"
  - fact: "The web runs on HTTP, which is stateless  -  cookies and sessions are workarounds to make it seem stateful"
  - fact: "In Python, everything is an object  -  integers, functions, classes, and modules are all first-class objects"
  - fact: "Linux, Python, PostgreSQL, and Android collectively run most of the world's digital infrastructure"
  - fact: "FORTRAN (1957) was the first high-level programming language  -  it made code readable to non-experts for the first time"
  - fact: "The 'stack' in a call stack is literally a stack data structure  -  LIFO: last in, first out"
  - fact: "Recursion is a function calling itself  -  it requires a base case to avoid infinite loops"
  - fact: "A hash collision happens when two different inputs produce the same hash  -  good hash functions minimise this"
  - fact: "Big O notation describes worst-case performance, not average  -  O(n^2) is quadratic, O(log n) is very efficient"
  - fact: "The SOLID principles in object-oriented design are guidelines, not laws  -  blindly following them produces over-engineering"
  - fact: "Testing your code before writing it (TDD) often produces cleaner, more focused designs"
  - fact: "Regex (regular expressions) are a formal mathematical object  -  they describe regular grammars precisely"
  - fact: "The 80/20 rule in software: 80% of bugs come from 20% of the code  -  identifying that 20% matters"
  - fact: "Deadlock in concurrent systems: two processes each waiting for a resource the other holds"
  - fact: "An API is a contract  -  breaking it without versioning is one of the most disruptive things you can do to users"
  - fact: "The P vs NP problem is the most famous unsolved problem in computer science  -  a $1 million prize awaits"
  - fact: "'There are only two hard things in computer science: cache invalidation and naming things'  -  Phil Karlton"
  - fact: "Functional programming treats functions as pure transformations  -  the same input always gives the same output"
  - fact: "Memory leaks happen when allocated memory is never freed  -  they're silent until the program crashes"
  - fact: "The most expensive software bug: Ariane 5 flight 501 crashed in 1996 due to a 64-bit float converted to 16-bit integer"
