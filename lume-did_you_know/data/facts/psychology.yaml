topic: psychology
display_name: "Psychology & Behaviour"
facts:
  - fact: "Confirmation bias: we instinctively seek information that confirms what we already believe"
  - fact: "The Dunning-Kruger effect: low competence inflates confidence; high competence often breeds self-doubt"
  - fact: "Sunk cost fallacy: continuing something bad because of what you've already put in  -  the past cost doesn't change"
  - fact: "Availability heuristic: we judge likelihood by how easily examples come to mind, not by actual probability"
  - fact: "The fundamental attribution error: we blame others' behaviour on their character, our own on circumstances"
  - fact: "Loss aversion: humans feel the pain of losing something roughly twice as strongly as the pleasure of gaining it"
  - fact: "Anchoring: the first number you hear in a negotiation disproportionately influences your final estimate"
  - fact: "Social proof: people follow the crowd in uncertain situations  -  this is exploited constantly in marketing"
  - fact: "The mere exposure effect: you tend to like things more simply because you've been exposed to them more often"
  - fact: "Cognitive dissonance: holding two contradictory beliefs at once causes discomfort  -  we resolve it by changing the weaker belief"
  - fact: "The bystander effect: in an emergency, the more people present, the less likely any individual is to help"
  - fact: "Reciprocity: being given something, even unsolicited, creates a strong urge to give something back"
  - fact: "The Zeigarnik effect: incomplete tasks stay in working memory more than completed ones  -  finish things to free your mind"
  - fact: "Priming: exposure to one concept unconsciously influences how you respond to a related concept seconds later"
  - fact: "Framing effect: 'a 10% failure rate' and 'a 90% success rate' are identical information but feel very different"
  - fact: "Peak-end rule: you remember an experience by its most intense moment and how it ended, not its average"
  - fact: "The spotlight effect: you believe others notice your mistakes and appearance far more than they actually do"
  - fact: "Habit loops consist of cue -> routine -> reward  -  changing the routine while keeping the cue and reward is how habits change"
  - fact: "People who feel in control of their own lives report significantly higher life satisfaction regardless of circumstances"
  - fact: "Most decisions are made emotionally first  -  the rational justification follows after. Kahneman calls this System 1 vs System 2"
  - fact: "Stress inoculation is real: mild repeated stress builds resilience. Total avoidance of stress makes you more fragile"
  - fact: "The paradox of choice: more options don't always increase satisfaction  -  they often increase regret"
  - fact: "Sleep deprivation impairs judgement in ways that feel indistinguishable from being well-rested from the inside"
  - fact: "Physical exercise is as effective as antidepressants for mild-to-moderate depression in multiple randomised studies"
  - fact: "You can't multitask  -  you can only rapidly switch attention. Each switch has a cost called attention residue"
  - fact: "The IKEA effect: you value things you built or assembled yourself more than identical pre-made items"
  - fact: "Intrinsic motivation (doing something for its own sake) produces better long-term performance than extrinsic rewards"
  - fact: "Gratitude journalling (writing 3 specific things daily) measurably increases wellbeing over 4-6 weeks in studies"
  - fact: "Regret over inaction increases with age  -  people in their 80s regret what they didn't do far more than what they did"
  - fact: "Emotional contagion is real: you unconsciously mirror the emotions of people around you  -  choose your company deliberately"
