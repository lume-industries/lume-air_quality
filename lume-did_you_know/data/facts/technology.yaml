topic: technology
display_name: "Technology"
facts:
  - fact: "The first computer bug was a literal insect  -  Grace Hopper found a moth in the Harvard Mark II in 1947"
  - fact: "Email predates the World Wide Web by 20 years  -  the first email was sent in 1971"
  - fact: "The first commercial SMS was sent on December 3, 1992: 'Merry Christmas'"
  - fact: "Wi-Fi doesn't stand for 'Wireless Fidelity'  -  the name was purely a marketing invention with no full form"
  - fact: "Phishing attacks account for over 90% of data breaches  -  almost all start with a deceptive email or message"
  - fact: "The cloud is just other people's computers  -  data stored 'in the cloud' lives in physical data centres"
  - fact: "GPS requires accounting for Einstein's relativity  -  satellite clocks run fast due to weaker gravity and must be corrected"
  - fact: "There are more connected devices on the Internet than there are people on Earth"
  - fact: "An SSD has no moving parts  -  it stores data using electrons trapped in floating gate transistors"
  - fact: "The first computer mouse was made of wood, had two metal wheels, invented by Doug Engelbart in 1964"
  - fact: "The QWERTY keyboard layout was not designed to slow typists down  -  that's a myth. It was optimised for telegraph operators"
  - fact: "The average attention span of a web user before navigating away is approximately 8 seconds"
  - fact: "The dark web is not illegal to access  -  it's an encrypted overlay network. Only some content on it is illegal"
  - fact: "Google processes approximately 8.5 billion searches per day  -  around 99,000 per second"
  - fact: "About 90% of all data in the world has been created in the last 10 years  -  the pace is still accelerating"
  - fact: "An iPhone has more computing power than all of NASA had when it put humans on the Moon"
  - fact: "The CSIRO (Australia's science agency) holds core patents on Wi-Fi technology"
  - fact: "Blue light from screens suppresses melatonin production and delays sleep onset  -  screen time before bed matters"
  - fact: "The 'Streisand Effect': attempting to suppress information online reliably draws more attention to it"
  - fact: "Around 80% of websites run on Linux servers  -  an operating system that is free and open source"
  - fact: "Moore's Law (transistor count doubles every ~2 years) is slowing  -  the era of free performance improvement is ending"
  - fact: "The Internet was not invented for the military  -  ARPANET was a resilient research network, not designed for nuclear war survival"
  - fact: "A Faraday cage (a grounded metal enclosure) blocks electromagnetic fields  -  this is why your phone loses signal in an elevator"
  - fact: "The first video call was made in 1927 by AT&T Bell Labs between New York and Washington"
  - fact: "Autocorrect was invented in 1993 by Dean Hachamovitch at Microsoft  -  originally for Word"
  - fact: "CAPTCHA stands for 'Completely Automated Public Turing test to tell Computers and Humans Apart'"
  - fact: "The @ symbol was chosen for email addresses because Ray Tomlinson said it was the least-used character in names"
  - fact: "A typical USB 3.0 drive transfers data at 5 Gbps  -  enough to copy a full HD movie in under a second"
  - fact: "Deepfake technology uses a type of AI called a Generative Adversarial Network (GAN)  -  two models competing"
  - fact: "The '404 Not Found' error code: the MIT building that housed the original web servers was Building 404"
