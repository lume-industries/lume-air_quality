topic: australia
display_name: "Australia Facts"
facts:
  - fact: "Australia is the only country that is also a continent"
  - fact: "Indigenous Australians have the oldest continuous culture on Earth  -  at least 65,000 years old"
  - fact: "Australia has more venomous snake species than any other country"
  - fact: "The Great Barrier Reef is the world's largest living structure, visible from space"
  - fact: "About 90% of Australians live within 100km of the coast"
  - fact: "Uluru is not the largest rock in Australia  -  Mount Augustus in WA is roughly twice its size"
  - fact: "Canberra was built as a compromise  -  Sydney and Melbourne both wanted to be the capital"
  - fact: "Australia is the driest inhabited continent  -  70% of the land is classified as arid or semi-arid"
  - fact: "The Australian Alps receive more snowfall each year than Switzerland"
  - fact: "The word 'kangaroo' is thought to come from the Guugu Yimithirr word 'gangurru'"
  - fact: "Australia hosts approximately 10% of the world's known biodiversity"
  - fact: "Melbourne has the largest tram network in the world outside a few European cities"
  - fact: "The Murray-Darling basin covers 14% of the continent and is Australia's most important river system"
  - fact: "The dingo is Australia's largest terrestrial predator and has been in Australia for about 4,000 years"
  - fact: "The platypus is one of only five mammal species that lay eggs  -  the others are echidna species"
  - fact: "The boomerang is one of the oldest human-made tools still in use  -  over 20,000 years old"
  - fact: "Australia's population (~27 million) is smaller than the city of Shanghai"
  - fact: "The Eastern States span three time zones in summer due to daylight saving differences"
  - fact: "Australia has the world's largest cattle station  -  Anna Creek Station is bigger than the country of Israel"
  - fact: "The Great Victoria Desert is Australia's largest desert by area  -  most people assume it's the Outback's Simpson"
  - fact: "Australia was the second country in the world (after New Zealand) to give women the right to vote"
  - fact: "The coat of arms shows an emu and a kangaroo because neither can easily walk backwards"
  - fact: "Australia has more wild camels than any other country  -  brought for colonial transport, now feral"
  - fact: "The CSIRO invented Wi-Fi  -  Australian scientist John O'Sullivan holds a core patent"
  - fact: "Vegemite was invented in 1922 by Cyril Callister, a food scientist working for the Fred Walker Company"
  - fact: "Australians invented the bionic ear (cochlear implant), the black box flight recorder, and the spray-on skin"
  - fact: "Lane Cove National Park is the only national park to be entirely surrounded by an urban area"
  - fact: "Australia's flag includes the Southern Cross, which is only visible from the Southern Hemisphere"
  - fact: "Hobart is the second-oldest city in Australia, settled just 15 years after Sydney"
  - fact: "About 30% of Australians were born overseas  -  one of the highest proportions of any country in the world"
