topic: science
display_name: "Science"
facts:
  - fact: "The scientific method is not about proving things  -  it's about designing tests that could disprove them"
  - fact: "Water is the only substance that naturally exists as solid, liquid, and gas at Earth's surface temperatures"
  - fact: "Honey never spoils  -  edible honey has been found in 3,000-year-old Egyptian tombs"
  - fact: "A teaspoon of neutron star material would weigh about 1 billion tonnes on Earth"
  - fact: "DNA from a single human body, stretched out, would reach from Earth to the Sun and back 600 times"
  - fact: "Hot water can freeze faster than cold water in some conditions  -  the Mpemba effect, still debated"
  - fact: "The smell of rain on dry ground is called petrichor  -  caused by bacteria releasing a compound called geosmin"
  - fact: "Old window glass isn't thicker at the bottom because it 'flowed'  -  it was made that way and installed heavier-end down"
  - fact: "Lightning strikes Earth roughly 100 times per second"
  - fact: "Every element heavier than iron was forged inside a supernova explosion"
  - fact: "Stomach acid (pH ~1.5-3.5) is strong enough to dissolve certain metals"
  - fact: "The reason the sky is blue: shorter wavelength blue light scatters more in the atmosphere (Rayleigh scattering)"
  - fact: "Octopus blood is blue  -  it uses copper-based haemocyanin instead of iron-based haemoglobin"
  - fact: "Sound cannot travel through the vacuum of space  -  it requires a medium to propagate through"
  - fact: "Light from the Sun takes about 8 minutes and 20 seconds to reach Earth"
  - fact: "Humans share about 60% of their DNA with a banana  -  basic cell chemistry is shared across all life"
  - fact: "Diamonds are not the rarest gemstone  -  quality rubies are rarer than equivalent-quality diamonds"
  - fact: "The human body replaces most of its cells every 7-10 years. Gut lining cells last just 5 days"
  - fact: "Nuclear reactions in the Sun produce energy that takes up to 100,000 years to reach the surface  -  then 8 minutes to reach Earth"
  - fact: "The placebo effect is real and measurable  -  even when patients know they're taking a placebo"
  - fact: "A bolt of lightning is only about 2.5cm wide  -  the brightness makes it look much larger"
  - fact: "The Moon is slowly moving away from Earth at about 3.8cm per year"
  - fact: "Glass is classified as an amorphous solid  -  it has a disordered molecular structure like a frozen liquid"
  - fact: "The deepest point on Earth (Challenger Deep) is deeper than Everest is tall"
  - fact: "Human eyes can detect a single photon of light in complete darkness"
  - fact: "Ice is less dense than liquid water  -  which is why it floats. Without this, most lakes would freeze solid"
  - fact: "The average cloud weighs about 500,000 kg  -  it stays up because updrafts exceed the settling velocity of droplets"
  - fact: "Time passes slightly faster at your head than at your feet due to gravity (gravitational time dilation)"
  - fact: "Most of the universe is dark matter and dark energy  -  the matter we can see is about 5% of the total"
  - fact: "The first living creature to orbit the Earth was a dog named Laika in 1957"
