topic: cooking
display_name: "Basic Cooking Skills"
facts:
  - fact: "Mise en place (French: 'everything in its place')  -  prep all ingredients before you start cooking"
  - fact: "The Maillard reaction is what makes browned food taste good. It needs high heat and a dry surface"
  - fact: "Salt pasta water until it tastes like the sea  -  it's the only chance to season the pasta itself"
  - fact: "Rest meat after cooking for at least 5 minutes  -  cutting immediately lets all the juices run out"
  - fact: "A dull knife is more dangerous than a sharp one  -  it slips more and requires more pressure"
  - fact: "Don't crowd the pan when searing  -  steam forms and prevents the browning you're after"
  - fact: "Garlic burns fast  -  add it after onions have softened, not before"
  - fact: "Taste as you go and season in layers  -  not just a dump of salt at the end"
  - fact: "Acid (lemon, vinegar) brightens dishes and balances richness  -  add a squeeze before serving"
  - fact: "Pat meat dry before searing  -  moisture steams instead of browns"
  - fact: "Fresh herbs go in at the end (parsley, coriander). Dried herbs go in early (thyme, rosemary)"
  - fact: "A roux (flour + fat) thickens without lumps  -  whisk constantly and add liquid slowly"
  - fact: "Internal temperature of cooked chicken should reach 75degC at the thickest part"
  - fact: "Emulsification is how mayo, hollandaise, and vinaigrette work  -  fat + acid + emulsifier (egg/mustard)"
  - fact: "Cold butter makes flaky pastry  -  warm butter melts the fat layers too early"
  - fact: "Boiling toughens proteins (eggs, meat). Simmering gently breaks down collagen instead"
  - fact: "Never put cold meat straight from the fridge into a hot pan  -  bring it to room temperature first"
  - fact: "Cast iron holds heat well but heats unevenly  -  preheat it slowly over medium before cranking it up"
  - fact: "If a sauce is too rich, add acid. Too thin, reduce it. Too bland, add salt then acid"
  - fact: "Blanching (brief boil then ice water) preserves colour and texture in vegetables"
  - fact: "Stock, not water, in risotto or rice dramatically improves flavour for almost zero extra effort"
  - fact: "Season with pinches not a shake  -  pinches let you feel how much you're adding"
  - fact: "Garlic, ginger, and onion are the aromatic base of most cuisines  -  master those three and most dishes follow"
  - fact: "An overcooked egg yolk turns green-grey from oxidised iron  -  not unsafe, just overdone"
  - fact: "Roast at higher heat than you think  -  220degC gives colour and doesn't dry things out if you time it right"
  - fact: "A pinch of sugar in tomato-based sauces balances acidity without making the dish sweet"
  - fact: "Deglazing the pan (adding liquid after browning) incorporates the fond  -  that's where the flavour is"
  - fact: "Low and slow is for tough cuts (shoulder, brisket). High heat is for tender cuts (fillet, backstrap)"
  - fact: "Oil should shimmer before you add food  -  if it smokes, it's too hot; if food sizzles slowly, it's too cold"
  - fact: "Bread is done when it sounds hollow when tapped on the bottom  -  internal temp should be 90degC+"
