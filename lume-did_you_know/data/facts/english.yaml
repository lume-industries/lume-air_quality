topic: english
display_name: "English Language Facts"
facts:
  - fact: "The word 'set' has the most meanings of any English word  -  the OED entry runs to 60,000 words"
  - fact: "'Cleave' is a contronym  -  it means both to split apart AND to cling together"
  - fact: "English has no word for the day after tomorrow. German does: ubermorgen. Swedish: overmorgon"
  - fact: "The letter Q has never been strictly necessary  -  every 'qu' sound can be spelled 'kw'"
  - fact: "'Literally' has been used figuratively since the 1700s  -  this is not a modern degradation"
  - fact: "English is a West Germanic language but ~60% of its vocabulary comes from French and Latin"
  - fact: "The word 'silly' originally meant 'blessed', then shifted through 'innocent' -> 'weak' -> 'foolish'"
  - fact: "'Nice' originally meant 'foolish' or 'wanton' in 13th century English"
  - fact: "Contronyms (auto-antonyms): 'sanction' means both to permit AND to penalise"
  - fact: "Contronyms: 'dust' means both to add dust (dust a cake) AND to remove dust (dust a shelf)"
  - fact: "The Oxford comma can completely change a sentence's meaning  -  'I love my parents, Paris and London'"
  - fact: "'Naughty' originally meant 'having nothing'  -  from 'naught'"
  - fact: "'Buxom' originally meant 'obedient' or 'flexible' in Old English"
  - fact: "The word 'salary' comes from Latin 'salarium'  -  the allowance given to Roman soldiers to buy salt"
  - fact: "English has more recorded synonyms for 'drunk' than almost any other concept  -  over 3,000 terms"
  - fact: "'Serendipity' was coined by Horace Walpole in 1754, inspired by a Persian fairy tale about lucky discoveries"
  - fact: "'Squint' is one of the few English words where all five vowels appear in alphabetical order: fAcEtIOUs"
  - fact: "The pangram 'The quick brown fox jumps over the lazy dog' uses every letter of the alphabet"
  - fact: "English spelling was partly frozen by early printers  -  pronunciation evolved but spellings often didn't"
  - fact: "The 'gh' in 'night', 'light', and 'right' was once pronounced  -  a guttural sound like Scots 'loch'"
  - fact: "'Awful' once meant 'inspiring awe'  -  the same root as 'awesome'. Both drifted in opposite directions"
  - fact: "'Terrific' once meant 'causing terror'  -  it shifted to positive just as 'terrible' kept its negative meaning"
  - fact: "The word 'grammar' and 'glamour' are the same word  -  'glamour' is a Scottish corruption of 'grammar'"
  - fact: "A contronym is also called a Janus word  -  Janus being the two-faced Roman god"
  - fact: "'Fizzle' originally meant to quietly fart in 16th-century English"
  - fact: "The shortest grammatically complete English sentence is 'Go.'"
  - fact: "There are only two letters of the English alphabet that are never silent: V and J"
  - fact: "The most common letter in English text is 'e', appearing in about 13% of all text"
  - fact: "The word 'queue' can be shortened to just 'q' and still pronounced exactly the same"
  - fact: "The semicolon is the most misused punctuation mark  -  it connects two independent clauses, not a list"
