topic: maths
display_name: "Mathematics"
facts:
  - fact: "0.999... (repeating forever) is exactly equal to 1  -  not approximately, but by mathematical proof"
  - fact: "There are more possible games of chess than atoms in the observable universe"
  - fact: "Pi is irrational and transcendental  -  its digits never repeat and it can't be a root of any polynomial"
  - fact: "In a group of just 23 people, there's over a 50% chance that two share the same birthday"
  - fact: "1 is not a prime number  -  primality requires exactly two distinct factors: 1 and itself"
  - fact: "Euler's identity: e^(ipi) + 1 = 0  -  combines the five most fundamental constants in all of mathematics"
  - fact: "Benford's Law: in most natural datasets, about 30% of numbers start with the digit 1  -  not ~11%"
  - fact: "A googol is 10^100. A googolplex is 10^(googol)  -  far larger than atoms in the observable universe"
  - fact: "Fold a piece of paper 42 times and the stack would reach from Earth to the Moon"
  - fact: "The Fibonacci sequence appears in sunflower spirals, nautilus shells, and leaf arrangements"
  - fact: "Infinity comes in different sizes  -  some infinite sets are provably larger than others (Cantor's theorem)"
  - fact: "The Monty Hall problem: switching doors doubles your chance of winning from 1/3 to 2/3"
  - fact: "There are more irrational numbers than rational numbers  -  even though both sets are infinite"
  - fact: "Prime numbers get sparser as numbers get larger  -  but they never stop (Euclid's proof from 300 BC)"
  - fact: "Kaprekar's constant: 6174. Take any 4-digit number, rearrange largest then smallest, subtract. Always reaches 6174"
  - fact: "A fractal has a non-integer dimension  -  the coastline of Britain is approximately 1.25-dimensional"
  - fact: "Godel: any mathematical system complex enough to do arithmetic contains truths that can't be proven within it"
  - fact: "The square root of 2 is irrational  -  the ancient Greeks found this so troubling they kept it secret"
  - fact: "The Four Colour Theorem: any map can be coloured with just 4 colours so no adjacent regions share a colour"
  - fact: "Bayes' theorem describes how to update beliefs based on new evidence  -  the foundation of rational inference"
  - fact: "In a 64-square chess tournament, if you double grains of wheat on each square, you'd need 18 quintillion grains"
  - fact: "A hexagon is the shape that tiles a flat surface using the least perimeter for a given area  -  hence honeycombs"
  - fact: "The sum of angles in any triangle is always 180deg in flat (Euclidean) geometry  -  but not on a sphere"
  - fact: "There are exactly five Platonic solids  -  tetrahedron, cube, octahedron, dodecahedron, icosahedron"
  - fact: "Simpson's Paradox: a trend can appear in subgroups of data but disappear or reverse when those groups are combined"
  - fact: "The number line has more points than there are natural numbers, even though both are infinite"
  - fact: "An irrational number to the power of an irrational number can be rational  -  e.g. sqrt2^(sqrt2^2) = 2"
  - fact: "A proof by contradiction works by assuming the opposite is true and showing it leads to an impossibility"
  - fact: "The concept of zero as a number was developed in India around the 5th century  -  a revolutionary idea"
  - fact: "There is no largest prime number  -  Euclid proved this in 300 BC with one of the most elegant proofs in history"
