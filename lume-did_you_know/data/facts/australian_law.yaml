topic: australian_law
display_name: "Australian & Victorian Law"
facts:
  - fact: "You are legally required to vote in Australian federal and state elections  -  not just enrol"
  - fact: "In Victoria, you must provide your name and address to police if asked  -  but nothing else"
  - fact: "You can be charged with trespass on private land in Victoria even if there is no sign"
  - fact: "Jaywalking is technically illegal in Victoria within 20 metres of a pedestrian crossing"
  - fact: "Defamation law in Australia: if what you said is true, it is not defamation"
  - fact: "A verbal contract is still a legally binding contract in Australia  -  writing just makes it easier to prove"
  - fact: "Australian employers must pay superannuation (currently 11.5%) on top of your wage, not as part of it"
  - fact: "In Victoria, a landlord must give 60 days written notice to end a no-fault tenancy"
  - fact: "Australian Consumer Law guarantees apply regardless of store policy  -  you're entitled to a remedy if goods fail"
  - fact: "The ACL guarantee is separate from (and stronger than) the manufacturer's warranty"
  - fact: "In Victoria, withholding rent because of repairs is illegal  -  contact Consumer Affairs Victoria instead"
  - fact: "Blood alcohol limit in Victoria is 0.05. For learners and P-platers it is 0.00"
  - fact: "Centrelink fraud is a Commonwealth criminal offence  -  repaying an overpayment does not erase the charge"
  - fact: "In most states including Victoria, you can record a phone call you are a party to without telling the other person"
  - fact: "Courts in Australia treat ignorance of the law as no defence  -  knowing the basics protects you"
  - fact: "In Victoria, you have up to 6 years to make a claim for most civil debts"
  - fact: "You can get a basic will done for free through State Trustees or a community legal centre"
  - fact: "Dying without a will (intestate) means the law decides who gets everything  -  it may not match your wishes"
  - fact: "In Victoria, smoke alarms must be installed in every bedroom and on every storey of a residential building"
  - fact: "You must carry photo ID (or have it accessible) when driving in Victoria"
  - fact: "Standing by while someone is in danger may create a duty of care in some circumstances in Victoria"
  - fact: "A 'cooling-off' period applies to many contracts signed outside a business premises (door-to-door sales)"
  - fact: "You are entitled to a copy of any contract before you are bound by it in Australia"
  - fact: "In Victoria, it is illegal to use a mobile phone while driving  -  even at a red light  -  unless in a cradle"
  - fact: "Speeding fines can be disputed if signage was unclear or obscured  -  photograph the scene immediately"
  - fact: "In Victoria, landlords cannot inspect without 24 hours written notice except in an emergency"
  - fact: "The right to silence is real  -  beyond name and address, you are not legally required to answer police questions"
  - fact: "Discrimination based on pregnancy, family responsibilities, or disability is unlawful in Victorian employment"
  - fact: "An employer cannot legally require you to work unpaid overtime consistently  -  check your award or EBA"
  - fact: "In Victoria, a person aged 10-17 can be held criminally responsible  -  the age of criminal responsibility is 10"
