topic: skills
display_name: "Skills Worth Learning"
facts:
  - fact: "CPR: 30 hard chest compressions then 2 breaths. Hands-only CPR is highly effective. Learn it: St John Ambulance (~2 hrs)"
  - fact: "How to stop bleeding: apply firm continuous pressure for 10 full minutes  -  don't lift to check. Learn it: first aid course"
  - fact: "Change a tyre: loosen wheel nuts before jacking, jack under the frame, use the spare. Practice it: in your driveway once"
  - fact: "Read a contract before signing: focus on termination, liability, and auto-renewal clauses. Practice: read one today deliberately"
  - fact: "Cook 5 things from scratch: scrambled eggs, pasta, roast chicken, stir fry, soup. Learn: one new dish per week for a month"
  - fact: "Run a basic budget: income - fixed expenses - savings = discretionary. Learn: track every expense for 30 days"
  - fact: "Give feedback without damage: 'I noticed / I felt / I'd prefer' framing. Read: 'Difficult Conversations'  -  Stone, Patton & Heen"
  - fact: "Say no without guilt: no is a complete sentence. Practice declining small requests before you need to for large ones"
  - fact: "Swim 50 metres without stopping. It's a survival skill. Learn: adult swim lessons at a council pool  -  often under $200"
  - fact: "Write a professional email: subject + purpose + request + thank you. Practice: reread an email before sending and cut it by half"
  - fact: "Negotiate: anchor first, justify with logic, let silence do the work. Read: 'Never Split the Difference' by Chris Voss"
  - fact: "Spot a phishing email: urgency + unusual sender + link that doesn't match the URL. Practice: Google's Phishing Quiz (free, 5 min)"
  - fact: "Fix a running toilet: usually a faulty flapper valve worth $5 from Bunnings. Learn: watch one YouTube video, then do it"
  - fact: "Talk to a doctor effectively: write a symptom list before the appointment. Ask 'what else could this be?'"
  - fact: "Take notes you'll actually use: write questions not facts, review within 24 hours. Read: 'How to Take Smart Notes' by Ahrens"
  - fact: "Apologise effectively: acknowledge, own it, don't justify it, state what you'll do differently. Try it once and notice the difference"
  - fact: "Sleep well: dark room, consistent schedule, cool temperature, no screens 30 min before bed. Read: 'Why We Sleep'  -  Walker"
  - fact: "Ask for help specifically: state the problem, what you've tried, and what you need. Use this formula every time"
  - fact: "Handle a panic attack: 5-4-3-2-1 grounding (5 things you see, 4 hear...), slow exhale. Don't fight it  -  ride it out"
  - fact: "Read a payslip: gross pay, tax withheld, super, net pay, YTD. If anything seems wrong, query it immediately"
  - fact: "Learn to type properly: 10-finger touch typing doubles your speed. Learn: typing.com or keybr.com  -  free, 15 min/day"
  - fact: "Drive in wet conditions: 4-second following distance, no cruise control, steer into a skid. Practice in an empty wet car park"
  - fact: "Set up a basic will: free through State Trustees or community legal centres. Do it before you think you need it"
  - fact: "Check your credit report: free once a year through Equifax, Illion, or Experian. Check for errors  -  they're common"
  - fact: "Change a smoke alarm battery: every alarm should be tested monthly, batteries replaced annually. Do it when clocks change"
  - fact: "Manage conflict: name the behaviour not the person ('that felt dismissive' not 'you're dismissive'). Practice on small things"
  - fact: "Back up your data: 3-2-1 rule  -  3 copies, 2 different media, 1 off-site (a free cloud service counts)"
  - fact: "Give a firm handshake: dry palm, full web-to-web grip, 2-3 pumps, make eye contact. It signals confidence immediately"
  - fact: "Navigate without GPS: read a street map and understand compass directions. Practice: turn GPS off for one local trip"
  - fact: "Write a clear instruction: state the goal, the steps, the expected result. Test it: give it to someone else to follow"
