topic: physics
display_name: "Physics"
facts:
  - fact: "Einstein considered his field equations of general relativity his greatest achievement  -  not E=mc^2"
  - fact: "Quantum entanglement correlates particles instantly regardless of distance  -  but can't transmit information faster than light"
  - fact: "From a photon's frame of reference, it is emitted and absorbed simultaneously  -  it experiences zero time"
  - fact: "The double-slit experiment: particles behave as waves until observed  -  measurement collapses the wave function"
  - fact: "Black holes don't 'suck'  -  at the same distance as the Sun, a black hole of equal mass has equal gravity"
  - fact: "The Higgs field (not 'Higgs boson') is why particles have mass at all  -  the boson is just an excitation of it"
  - fact: "Space is not empty  -  quantum fields fill all of space, and their ground state energy is not zero"
  - fact: "Time dilation is real and GPS satellites must account for it  -  otherwise navigation would drift by km per day"
  - fact: "The Casimir effect: virtual particles from the vacuum exert measurable force on closely spaced metal plates"
  - fact: "At absolute zero, matter doesn't stop moving  -  quantum mechanics imposes a minimum 'zero-point energy'"
  - fact: "Sound can travel faster through a solid than light travels through glass"
  - fact: "The heat death of the universe is the theoretical endpoint  -  maximum entropy, no usable energy remaining"
  - fact: "Antimatter is real and produced in particle accelerators  -  it annihilates with matter and releases pure energy"
  - fact: "Schrodinger's Cat is not about cats  -  it's a thought experiment about applying quantum superposition to large objects"
  - fact: "Light has no mass but does have momentum  -  solar sails use radiation pressure from sunlight for propulsion"
  - fact: "The twin paradox is resolved by special relativity  -  the travelling twin genuinely ages less. This is measured"
  - fact: "The three fundamental constants (c, h, G) define the Planck scale  -  the smallest meaningful length in physics"
  - fact: "An electron doesn't actually orbit the nucleus in a circle  -  it exists as a probability cloud called an orbital"
  - fact: "Nothing with mass can reach the speed of light  -  it would require infinite energy"
  - fact: "The strong nuclear force is about 100 times stronger than electromagnetism but acts over extremely short distances"
  - fact: "General relativity predicts gravitational waves  -  ripples in spacetime. They were directly detected in 2015"
  - fact: "Radioactive decay is genuinely random  -  there is no deeper 'hidden variable' causing individual atoms to decay when they do"
  - fact: "The observable universe is about 93 billion light-years in diameter  -  larger than the age of the universe in light-years because space expands"
  - fact: "Neutrinos barely interact with matter  -  65 billion pass through every square centimetre of your body per second"
  - fact: "Thermodynamics: you can't win, you can't break even, and you can't leave the game"
  - fact: "The speed of light in glass is roughly 200,000 km/s  -  slower than in vacuum due to interaction with atoms"
  - fact: "Entropy describes disorder, but more precisely it describes the number of possible microstates a system can be in"
  - fact: "Quantum tunnelling allows particles to pass through energy barriers they classically couldn't  -  this is how the Sun fuses hydrogen"
  - fact: "The Coriolis effect makes large storms rotate counterclockwise in the Northern Hemisphere and clockwise in the Southern"
  - fact: "A compass doesn't point to geographic north  -  it points to magnetic north, which wanders by up to 50km/year"
