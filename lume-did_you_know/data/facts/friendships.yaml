topic: friendships
display_name: "Maintaining Friendships"
facts:
  - fact: "The Dunbar number: humans can maintain about 150 relationships but only ~5 genuinely close ones"
  - fact: "Friendships halve in closeness roughly every 3 years without active maintenance"
  - fact: "Send a message when you think of someone  -  you don't need a reason or an agenda"
  - fact: "Friendships survive distance better than they survive not being prioritised"
  - fact: "People remember how you made them feel, not what you said"
  - fact: "Showing up to someone's bad times matters far more than celebrating their good times"
  - fact: "Ask questions about what actually matters to them  -  most people feel chronically under-listened-to"
  - fact: "Track reciprocity: if you're always the one initiating, that's worth naming gently"
  - fact: "'We should catch up' is not a plan. 'Are you free Thursday?' is a plan"
  - fact: "Vulnerability is the mechanism of deepening friendship  -  not the reward after it's already deep"
  - fact: "In-person contact matters significantly more than digital contact for friendship quality"
  - fact: "Friends from different life stages serve different purposes  -  don't expect them all to be close"
  - fact: "Conflict avoided in friendship tends to fester  -  addressed early it usually strengthens the bond"
  - fact: "Remember what they're anxious about and ask  -  it communicates 'you matter to me'"
  - fact: "Group chats lower the barrier to staying connected but can substitute for real one-on-one time"
  - fact: "Do things together that don't require talking  -  activity-based friendships are often more durable"
  - fact: "Tell your friends specifically what you value about them  -  people almost never hear this"
  - fact: "Pick up the phone sometimes  -  voice carries things text genuinely cannot"
  - fact: "Being interested in them consistently beats being interesting yourself"
  - fact: "Long friendships have conflict  -  the measure is not zero conflict but repair after conflict"
  - fact: "Check in when nothing is wrong  -  don't only appear during a crisis or when you need something"
  - fact: "Your social life will naturally shrink as life gets busier. That's normal, but reversible with intention"
  - fact: "Research shows that lonely people have equivalent health risks to smoking 15 cigarettes a day"
  - fact: "Friendships need a context  -  shared activity or proximity. When those go, you have to create a new context"
  - fact: "The act of being consistently there, even briefly, matters more than grand gestures"
  - fact: "Friendships in adulthood require deliberate scheduling  -  spontaneity alone stops working after your 20s"
  - fact: "People who feel they have strong friendships report higher life satisfaction than those who are wealthy"
  - fact: "It is possible to have a 10-year friendship gap and pick it back up  -  but you have to actually reach out"
  - fact: "The best thing you can do for a friend in crisis is ask 'do you want advice, or do you just want to vent?'"
  - fact: "Social media contact does not count as maintaining a friendship  -  it's passive observation"
