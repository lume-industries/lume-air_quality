topic: parenting_daughter
display_name: "Parenting Your Daughter"
facts:
  - fact: "Girls who have a strong relationship with their father develop higher self-esteem on average"
  - fact: "Praising effort over ability ('you worked hard') builds a growth mindset  -  praising intelligence backfires"
  - fact: "Let your daughter see you make mistakes and recover from them  -  it teaches resilience better than any lecture"
  - fact: "Ask 'what was the best part of your day?' instead of 'how was school?'  -  you'll get real answers"
  - fact: "Children who feel genuinely heard are far more likely to come to you with serious problems as teenagers"
  - fact: "Physical affirmation  -  hugs, high fives, sitting close  -  matters as much as verbal praise"
  - fact: "Model the emotional vocabulary you want her to have. Name your own feelings out loud"
  - fact: "Play is a child's primary language for processing the world  -  protect unstructured play time"
  - fact: "Consistent daily routines reduce child anxiety more than most other interventions"
  - fact: "Teach her that 'no' is a complete sentence  -  she doesn't owe anyone an explanation"
  - fact: "Cook together regularly  -  it's a life skill and one of the best bonding rituals available"
  - fact: "Let her be genuinely bored sometimes  -  boredom is the birthplace of creativity and self-direction"
  - fact: "Read aloud to her even after she can read herself  -  it builds vocabulary faster than silent reading"
  - fact: "She watches how you treat service staff, other drivers, strangers  -  that is character education"
  - fact: "Girls with involved fathers perform better in STEM subjects on average"
  - fact: "Teach her to fix things  -  a bike, a leaking tap. Confidence grows with physical competence"
  - fact: "Ask her opinion about small things and take it seriously  -  it builds the habit of having a voice"
  - fact: "Don't solve all her problems for her. Ask: 'what do you think you should do?'"
  - fact: "Let her see you prioritise your own health and rest  -  that gives her permission to do the same"
  - fact: "Talk about money openly with her using age-appropriate honesty  -  financial literacy starts young"
  - fact: "Tell her stories about strong women  -  historical, fictional, family. Representation in narrative matters"
  - fact: "Apologise to her when you get it wrong  -  it models accountability better than any rule you can set"
  - fact: "Let her disagree with you and show her how to argue fairly and hold a position with evidence"
  - fact: "Shared rituals (a weekly breakfast, a show you watch together) become anchors she'll carry into adulthood"
  - fact: "Quality of time beats quantity  -  fully present for 20 minutes beats distracted for 2 hours"
  - fact: "How you talk about women in general directly teaches her how to see herself"
  - fact: "Daughters of emotionally available fathers are statistically less likely to experience teen depression"
  - fact: "She needs to hear what you specifically love about her  -  not generic praise, but specific observation"
  - fact: "Avoid gendering her emotions  -  'big girls don't cry' is directly harmful to emotional development"
  - fact: "Celebrate her specific interests even if they're not yours  -  curiosity is more valuable than any subject"
  - fact: "The relationship you model with your own friends teaches her what friendship is supposed to look like"
  - fact: "Her attachment to you is the template for future relationships  -  warmth and reliability matter most"
  - fact: "Show her that you read, learn, and stay curious  -  learning is modelled more than taught"
