topic: cars
display_name: "Car Facts & Maintenance"
facts:
  - fact: "Check tyre pressure monthly when cold  -  incorrect pressure affects fuel economy, handling, and wear"
  - fact: "The 'check engine' light can mean something minor (loose fuel cap) or serious (misfiring)  -  get it scanned with an OBD-II reader"
  - fact: "A car battery typically lasts 3-5 years  -  heat and lots of short trips degrade it faster"
  - fact: "Brakes should be inspected at least annually  -  squealing means worn pads, grinding means metal-on-metal"
  - fact: "Running on low fuel frequently can damage the fuel pump, which is cooled by the surrounding fuel"
  - fact: "If your car overheats, turn the heater on full  -  it draws heat from the engine and may get you to safety"
  - fact: "Jump-starting a car incorrectly can fry modern electronics  -  positive to positive, negative to chassis ground"
  - fact: "Automatic transmission fluid benefits from changing at 60-100k km despite being called 'lifetime fill'"
  - fact: "Wiper blades smearing is a safety issue  -  replace them before it becomes a visibility problem"
  - fact: "Wheel alignment and tyre rotation are different things  -  both matter for even wear and handling"
  - fact: "A seized handbrake is common on cars always parked on flat ground  -  use it regularly to prevent seizure"
  - fact: "Spark plugs should be replaced every 30-100k km depending on type  -  worn plugs cause misfires and waste fuel"
  - fact: "On a wet road, allow at least 4 seconds of following distance  -  wet roads triple stopping distances"
  - fact: "Driving with underinflated tyres increases stopping distances and rollover risk in corners"
  - fact: "Modern cars have multiple ECUs  -  a cheap OBD-II Bluetooth scanner reads fault codes for under $30"
  - fact: "Coolant must never be topped up on a hot engine  -  the pressurised radiator can spray scalding fluid"
  - fact: "The differential allows wheels to rotate at different speeds in corners  -  the outer wheel travels further"
  - fact: "Air filter replacement is cheap and improves fuel economy noticeably when done at the recommended interval"
  - fact: "If a tyre blows at speed, gently accelerate briefly then ease off  -  braking sharply causes a spin"
  - fact: "Ethanol blend fuel (E10) has slightly lower energy density  -  you'll use marginally more to travel the same distance"
  - fact: "Engine oil should be checked with the dipstick when the engine is warm but has been off for 5 minutes"
  - fact: "Loosen wheel nuts before jacking the car  -  once it's in the air the wheel spins freely"
  - fact: "Most cars have a fuel range indicator  -  but 'empty' typically still means 40-60km remaining in reserve"
  - fact: "Visibility from the driver's seat has worsened significantly since 2000 due to higher belt lines and smaller windows"
  - fact: "Tyre age matters regardless of tread depth  -  rubber degrades. Tyres older than 6-10 years should be replaced"
  - fact: "Coolant degrades over time and loses its anti-corrosion properties  -  flush it every 2-5 years"
  - fact: "If your brakes fade going downhill, use a lower gear to engine-brake rather than riding the brakes"
  - fact: "Lane departure assist and auto-emergency braking have measurably reduced crash rates in studies"
  - fact: "Power steering fluid leaks are silent until you suddenly lose steering feel  -  check it with other fluids"
  - fact: "Australia drives on the left  -  when parking on a two-way road at night, face the direction of traffic flow"
