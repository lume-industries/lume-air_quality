topic: animals_collective
display_name: "Animal Collective Nouns"
facts:
  - fact: "A group of crows is called a murder"
  - fact: "A group of flamingos is called a flamboyance"
  - fact: "A group of owls is called a parliament"
  - fact: "A group of jellyfish is called a smack"
  - fact: "A group of cats is called a clowder"
  - fact: "A group of rhinos is called a crash"
  - fact: "A group of porcupines is called a prickle"
  - fact: "A group of wombats is called a wisdom"
  - fact: "A group of butterflies is called a kaleidoscope"
  - fact: "A group of hippos is called a bloat"
  - fact: "A group of eagles is called a convocation"
  - fact: "A group of foxes is called a skulk"
  - fact: "A group of otters is called a romp"
  - fact: "A group of ferrets is called a business"
  - fact: "A group of lemurs is called a conspiracy"
  - fact: "A group of hummingbirds is called a charm"
  - fact: "A group of parrots is called a pandemonium"
  - fact: "A group of penguins in water is called a raft"
  - fact: "A group of sharks is called a shiver"
  - fact: "A group of starlings in flight is called a murmuration"
  - fact: "A group of geese on the ground is a gaggle; in the sky, a skein"
  - fact: "A group of larks is called an exaltation"
  - fact: "A group of peacocks is called an ostentation"
  - fact: "A group of wolves is called a pack"
  - fact: "A group of hyenas is called a cackle"
  - fact: "A group of baboons is called a congress"
  - fact: "A group of apes is called a shrewdness"
  - fact: "A group of bears is called a sloth"
  - fact: "A group of pandas is called an embarrassment"
  - fact: "A group of cheetahs is called a coalition"
  - fact: "A group of tigers is called a streak or ambush"
  - fact: "A group of giraffes is called a tower"
  - fact: "A group of zebras is called a dazzle"
  - fact: "A group of pigs is called a sounder"
  - fact: "A group of frogs is called an army"
  - fact: "A group of toads is called a knot"
  - fact: "A group of crocodiles sunbathing is called a bask"
  - fact: "A group of goldfish is called a troubling"
  - fact: "A group of kangaroos is called a mob"
  - fact: "A group of ravens is called an unkindness"
  - fact: "A group of vultures circling is called a kettle"
  - fact: "A group of turkeys is called a rafter"
  - fact: "A group of dolphins is called a pod"
  - fact: "A group of whales is called a pod or a gam"
  - fact: "A group of herrings is called an army"
  - fact: "A group of locusts is called a plague"
  - fact: "A group of moles is called a labour"
  - fact: "A group of meerkats is called a mob or a gang"
