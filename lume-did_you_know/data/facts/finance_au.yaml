topic: finance_au
display_name: "Finance: Single Dad in Australia"
facts:
  - fact: "Australia's tax is progressive  -  your marginal rate only applies to income in that bracket, not all of it"
  - fact: "Salary sacrificing into super reduces taxable income  -  contributions are taxed at 15% not your marginal rate"
  - fact: "Concessional (pre-tax) super contributions are capped at $27,500/year  -  unused cap carries forward 5 years"
  - fact: "Superannuation is generally protected from bankruptcy  -  it's one of the few assets creditors cannot touch"
  - fact: "Credit card interest in Australia averages 19-22%  -  carrying a balance is extremely expensive"
  - fact: "An extra $200/month on a $400k mortgage at 6% saves roughly $80,000 in interest over the loan life"
  - fact: "Family Tax Benefit Part A and B are available to low-to-middle income parents  -  check eligibility on MyGov"
  - fact: "Child support is calculated on both parents' incomes, time with the child, and care costs  -  use the Services Australia estimator"
  - fact: "Dollar-cost averaging (investing fixed amounts regularly) consistently outperforms trying to time the market"
  - fact: "Compound interest works for you in investments and against you in debt  -  start early, pay off early"
  - fact: "Negative gearing on investment property only makes sense if long-term growth exceeds the annual losses"
  - fact: "Franking credits on Australian shares often result in a tax refund for tax already paid by the company"
  - fact: "Income protection insurance is tax-deductible and far cheaper when you're healthy than when you need it"
  - fact: "The Medicare Levy Surcharge applies if you earn over $93,000 and have no private hospital cover"
  - fact: "ATO's myDeductions app lets you track work expenses year-round  -  missing deductions is leaving money on the table"
  - fact: "Work-from-home costs (portion of electricity, internet, phone) are tax-deductible with proper records"
  - fact: "A financial planner charging a flat fee is generally more trustworthy than one paid by product commission"
  - fact: "The offset account on your mortgage reduces interest charged daily  -  parking savings there beats a savings account rate"
  - fact: "Income earned by your child (e.g. from a trust) is taxed at a penal rate  -  get proper advice before structuring this"
  - fact: "The First Home Super Saver Scheme lets first home buyers save up to $50,000 through super for a deposit"
  - fact: "Salary packaging through a non-profit employer can let you pay rent or mortgage repayments pre-tax"
  - fact: "Redraw facilities on your mortgage can seem like savings  -  but the bank can restrict access unlike an offset account"
  - fact: "If you have an ABN and earn business income, you can claim a much wider range of deductions  -  keep receipts"
  - fact: "The highest interest rate debt should always be paid off first  -  usually credit cards before anything else"
  - fact: "Review your super fund's investment option  -  most people are in a default balanced option; check if it fits your horizon"
  - fact: "Emergency fund rule of thumb: 3-6 months of essential expenses in liquid savings before investing"
  - fact: "The ATO has a 'myTax' self-lodgement option  -  for straightforward returns it's free and faster than an accountant"
  - fact: "Shares held over 12 months qualify for the 50% CGT discount in Australia"
  - fact: "Superannuation death benefits can be complex  -  nominate a binding beneficiary to avoid your super going to court"
  - fact: "Renters insurance is cheap ($200-400/year) and covers your belongings if you rent  -  contents are not covered by the landlord's building insurance"
