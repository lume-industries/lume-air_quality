topic: biology
display_name: "Biology"
facts:
  - fact: "Humans share 98.7% of DNA with chimpanzees  -  and about 85% with zebrafish"
  - fact: "The human brain consumes 20% of the body's energy despite being only 2% of its mass"
  - fact: "Trees in a forest share nutrients and warning signals through fungal networks  -  called the Wood Wide Web"
  - fact: "Mitochondria have their own DNA and were once free-living bacteria absorbed by early cells"
  - fact: "Viruses are not considered alive  -  they have no metabolism and can't reproduce independently"
  - fact: "A gram of soil contains up to 10 billion bacteria  -  more than the total number of humans who've ever lived"
  - fact: "The appendix is not vestigial  -  it's a reservoir of gut bacteria used to repopulate the colon after illness"
  - fact: "Sharks are older than trees  -  shark fossils predate the first trees by about 50 million years"
  - fact: "The tardigrade (water bear) can survive the vacuum of space, radiation 1,000x lethal to humans, and -272degC"
  - fact: "CRISPR-Cas9 gene editing is based on a bacterial immune system that cuts and stores viral DNA"
  - fact: "Every cell in your body contains roughly 2 metres of DNA  -  packed into a nucleus 6 micrometres wide"
  - fact: "Your brain has a visual blind spot where the optic nerve connects  -  you don't notice it because your brain fills it in"
  - fact: "Identical twins can have different fingerprints  -  fingerprints are influenced by position in the womb, not just DNA"
  - fact: "About 8% of the human genome consists of ancient viral DNA  -  retroviruses that integrated into our ancestors' cells"
  - fact: "There are more microbial cells in and on the human body than human cells  -  roughly 1.3 to 1"
  - fact: "Bees can recognise human faces  -  they use a similar holistic processing method to humans"
  - fact: "Dogs can detect epileptic seizures before they happen  -  they may sense biochemical changes in the body"
  - fact: "The blue whale's heart is so large a small human could crawl through the aorta"
  - fact: "Slime moulds (not fungi, not animal, not plant) can solve maze problems and model efficient transport networks"
  - fact: "The mantis shrimp has 16 types of colour photoreceptors  -  humans have 3. What it 'sees' is hard to imagine"
  - fact: "Octopuses have three hearts, blue blood, and nine brains  -  one central and one in each arm"
  - fact: "Humans are one of the few species that blush  -  and the only one that does it in response to social emotions"
  - fact: "The liver is the only internal organ that can fully regenerate from as little as 25% of its original mass"
  - fact: "The common cold virus (rhinovirus) thrives at 33degC  -  the temperature of the nasal passage, not core body temperature"
  - fact: "A human sneeze can travel at up to 160km/h and project droplets 8 metres"
  - fact: "Eyelashes have a lifespan of about 3-6 months  -  they're replaced entirely multiple times per year"
  - fact: "The hardest substance in the human body is tooth enamel  -  harder than gold, platinum, and most metals"
  - fact: "Babies are born with approximately 270 bones  -  many fuse together to form the 206 bones adults have"
  - fact: "The knee is the largest joint in the human body and the most commonly injured"
  - fact: "Skin is the largest organ in the human body  -  it accounts for about 16% of body weight"
