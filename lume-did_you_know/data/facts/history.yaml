topic: history
display_name: "History"
facts:
  - fact: "Cleopatra lived closer in time to the Moon landing than to the building of the Great Pyramid"
  - fact: "The Great Wall of China was not visible from space with the naked eye  -  this was debunked by Chinese astronauts"
  - fact: "Oxford University is older than the Aztec Empire  -  teaching began at Oxford around 1096"
  - fact: "The fax machine was invented in 1843  -  before the telephone (1876) and before the US Civil War began"
  - fact: "The Vikings did not wear horned helmets  -  the one horned helmet found is a ceremonial piece, not battle gear"
  - fact: "Napoleon was not short  -  he was 5'7\", average height for a Frenchman of his era. The myth came from British propaganda"
  - fact: "The Library of Alexandria was not destroyed in a single catastrophic fire  -  it declined over centuries through underfunding"
  - fact: "More people died in the 1918 Spanish Flu pandemic than in all of World War I"
  - fact: "Einstein was not poor at school  -  he excelled in maths and physics. He failed an entry exam, but later passed"
  - fact: "The first country to give women the right to vote was New Zealand, in 1893. Australia followed in 1902"
  - fact: "Julius Caesar was not born by Caesarean section  -  his mother lived decades after his birth, making this impossible"
  - fact: "The Black Death killed an estimated 30-60% of Europe's population in the 14th century  -  roughly 50 million people"
  - fact: "The Roman Empire in the East (Byzantine Empire) survived until 1453  -  over 1,000 years after Rome fell in the West"
  - fact: "Genghis Khan's Mongol Empire was the largest contiguous land empire in history  -  larger than the British Empire at its peak"
  - fact: "George Washington owned 317 enslaved people at the time of his death  -  historical heroism is never simple"
  - fact: "The first photograph of a human was taken in 1838  -  a man having his boots shined on a Paris boulevard"
  - fact: "The Cuban Missile Crisis was closer to nuclear war than most people realise  -  a Soviet submarine captain had the authority to launch"
  - fact: "The shortest war in history was the Anglo-Zanzibar War in 1896  -  it lasted between 38 and 45 minutes"
  - fact: "Ancient Egyptians used to shave off their eyebrows to mourn the death of a cat"
  - fact: "The Berlin Wall fell not because of a coordinated plan  -  a confused press conference statement caused crowds to gather"
  - fact: "Aboriginal Australians used controlled burning (fire-stick farming) to manage landscapes for at least 50,000 years"
  - fact: "The Cold War nearly ended in 1983 when a Soviet nuclear early-warning system falsely detected incoming missiles  -  one man stood down"
  - fact: "World War I began over a chain of treaty obligations triggered by an assassination  -  not a single country's decision"
  - fact: "The printing press (1440) caused a century of religious wars by making it impossible to control information"
  - fact: "The Great Depression was worsened by governments raising tariffs and cutting spending  -  the opposite of what worked"
  - fact: "The Titanic had enough lifeboat space for only about half of those on board  -  regulations hadn't caught up with ship size"
  - fact: "Australia fought in every major conflict of the 20th century as part of alliances formed largely by geography and trade"
  - fact: "The Silk Road was not a single road  -  it was a shifting network of trade routes connecting China to Rome for over 1,500 years"
  - fact: "The phrase 'rule of thumb' has an uncertain origin  -  the claim it refers to wife-beating has no historical evidence"
  - fact: "The concept of a formal written constitution was extremely rare before 1787  -  the US Constitution was a genuine innovation"
